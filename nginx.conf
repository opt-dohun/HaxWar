worker_processes auto;
worker_rlimit_nofile 20480;

events {
    worker_connections 10240;
    use epoll;
}

http {
    # WebSocket 연결을 정상적으로 업그레이드하기 위한 맵 정의
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream hexwar_servers {
        # 클라이언트 IP 기반 스티키 세션 적용
        ip_hash; 
        
        # Docker Compose 내부 네트워크 상의 서비스명과 포트 지정
        server hexwar-server-1:5000;
        server hexwar-server-2:5000;

        # Nginx가 백엔드 서버들과 맺어둘 유휴 커넥션 개수
        keepalive 32; 
    }

    server {
        listen 80;

        location / {
            proxy_pass http://hexwar_servers;
            
            # HTTP/1.1 프로토콜 사용 (WebSocket 연동 필수)
            proxy_http_version 1.1;
            
            # WebSocket 프록시 관련 헤더 설정
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            # 클라이언트 실제 IP 정보 전달
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 연결 유지를 위해 프록시 타임아웃 연장 (기본값은 60초)
            # 게임 세션 도중 연결이 끊기지 않도록 넉넉하게 설정합니다.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            
            # 실시간 패킷 전송을 위해 Nginx 버퍼링 비활성화
            proxy_buffering off;
        }
    }
}
