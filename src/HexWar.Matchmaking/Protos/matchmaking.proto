syntax = "proto3";

package matchmaking;

option csharp_namespace = "HexWar.Matchmaking.Protos";

service MatchmakingService {
  rpc JoinQueue(JoinQueueRequest) returns (stream MatchmakingResponse);
  rpc LeaveQueue(LeaveQueueRequest) returns (LeaveQueueResponse);
}

message JoinQueueRequest {
  string player_id = 1;
  int32 skill_rating = 2;
}

message MatchmakingResponse {
  string status = 1; // e.g., "Searching", "Matched", "Failed"
  string match_id = 2;
  string game_room_id = 3;
  string player_side = 4; // "A" or "B"
}

message LeaveQueueRequest {
  string player_id = 1;
}

message LeaveQueueResponse {
  bool success = 1;
}
