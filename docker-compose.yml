version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: hexwar-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy volatile-lru --save 60 1 --loglevel notice
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '300M'
        reservations:
          cpus: '0.25'
          memory: '100M'
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - hexwar-network

  # 게임 서버 노드 1
  hexwar-server-1:
    build:
      context: .
      dockerfile: src/HexWar.Server/Dockerfile
    container_name: hexwar-server-1
    depends_on:
      redis:
        condition: service_healthy
    # 리소스 제한
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '256M'
        reservations:
          cpus: '0.5'
          memory: '128M'
    # 파일 디스크립터 한도 증가 (limits.conf 대체)
    ulimits:
      nofile:
        soft: 20480
        hard: 20480
    # 커널 네트워크 튜닝 (sysctl.conf 대체)
    sysctls:
      net.core.somaxconn: 65535
    # 환경 변수
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - DOTNET_GCServer=1
      - DOTNET_GCHeapCount=1
      - DOTNET_GCLatencyMode=SustainedLowLatency # GC Latency 모드 튜닝
      - Redis__ConnectionString=redis:6379
      - ConnectionStrings__Redis=redis:6379
    # 헬스체크
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/api/diagnostics/stats" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - hexwar-network

  # 게임 서버 노드 2
  hexwar-server-2:
    build:
      context: .
      dockerfile: src/HexWar.Server/Dockerfile
    container_name: hexwar-server-2
    depends_on:
      redis:
        condition: service_healthy
    # 리소스 제한
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: '256M'
        reservations:
          cpus: '0.5'
          memory: '128M'
    # 파일 디스크립터 한도 증가
    ulimits:
      nofile:
        soft: 20480
        hard: 20480
    # 커널 네트워크 튜닝
    sysctls:
      net.core.somaxconn: 65535
    # 환경 변수
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - DOTNET_GCServer=1
      - DOTNET_GCHeapCount=1
      - DOTNET_GCLatencyMode=SustainedLowLatency
      - Redis__ConnectionString=redis:6379
      - ConnectionStrings__Redis=redis:6379
    # 헬스체크
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/api/diagnostics/stats" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - hexwar-network

  # Nginx 리버스 프록시 및 로드 밸런서
  nginx:
    image: nginx:alpine
    container_name: hexwar-nginx
    ports:
      - "5020:80" # 기존의 5020 포트를 Nginx 80 포트로 바인딩
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - hexwar-server-1
      - hexwar-server-2
    # 파일 디스크립터 한도 증가
    ulimits:
      nofile:
        soft: 20480
        hard: 20480
    # 커널 네트워크 튜닝
    sysctls:
      net.core.somaxconn: 65535
      net.ipv4.tcp_max_syn_backlog: 8192
      net.ipv4.ip_local_port_range: "1024 65000"
      net.ipv4.tcp_tw_reuse: 1
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - hexwar-network

  hexwar-benchmarks:
    build:
      context: .
      dockerfile: tests/HexWar.Benchmarks/Dockerfile
    volumes:
      - ./BenchmarkDotNet.Artifacts:/app/BenchmarkDotNet.Artifacts

volumes:
  redis-data:
    driver: local

networks:
  hexwar-network:
    driver: bridge
